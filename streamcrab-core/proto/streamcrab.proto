syntax = "proto3";

package streamcrab;

service JobManagerService {
  rpc RegisterTaskManager(RegisterTMRequest) returns (RegisterTMResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc AckCheckpoint(CheckpointAck) returns (Empty);
  rpc ReportFailure(FailureReport) returns (Empty);
  rpc SubmitJob(SubmitJobRequest) returns (SubmitJobResponse);
  rpc GetJobStatus(GetJobStatusRequest) returns (GetJobStatusResponse);
  rpc TriggerCheckpoint(TriggerCheckpointRequest) returns (TriggerCheckpointResponse);
  rpc TriggerRescale(TriggerRescaleRequest) returns (TriggerRescaleResponse);
  rpc ListTaskManagers(ListTaskManagersRequest) returns (ListTaskManagersResponse);
}

service TaskManagerService {
  rpc DeployTask(TaskDeploymentDescriptor) returns (DeploymentResult);
  rpc CancelTask(CancelTaskRequest) returns (Empty);
  rpc TriggerCheckpoint(CheckpointBarrier) returns (Empty);
  rpc NotifyCheckpointComplete(CheckpointComplete) returns (Empty);
}

service StateService {
  rpc Get(GetRequest) returns (GetResponse);
  rpc Put(PutRequest) returns (PutResponse);
  rpc BatchGet(BatchGetRequest) returns (BatchGetResponse);
  rpc BatchPut(BatchPutRequest) returns (BatchPutResponse);
  rpc TopKeys(TopKeysRequest) returns (TopKeysResponse);
  rpc Flush(FlushRequest) returns (FlushResponse);
  rpc TriggerSnapshot(TriggerSnapshotRequest) returns (TriggerSnapshotResponse);
  rpc Seal(SealRequest) returns (SealResponse);
  rpc Rollback(RollbackRequest) returns (RollbackResponse);
}

message Empty {}

message Resources {
  uint32 cpu_cores = 1;
  uint64 memory_mb = 2;
}

message RegisterTMRequest {
  string tm_id = 1;
  string address = 2;
  uint32 num_slots = 3;
  Resources resources = 4;
}

message RegisterTMResponse {
  bool accepted = 1;
  string message = 2;
}

message HeartbeatRequest {
  string tm_id = 1;
  int64 timestamp = 2;
  uint32 queue_usage = 3;
  uint64 throughput = 4;
}

message HeartbeatResponse {
  bool alive = 1;
}

message FailureReport {
  string tm_id = 1;
  string task_id = 2;
  string reason = 3;
}

message CheckpointAck {
  uint64 checkpoint_id = 1;
  string task_id = 2;
  bytes state_bytes = 3;
}

message TaskDeploymentDescriptor {
  string task_id = 1;
  uint32 vertex_id = 2;
  uint32 subtask_index = 3;
  bytes operator_bytes = 4;
  repeated uint32 input_channels = 5;
  repeated uint32 output_channels = 6;
  repeated string output_peer_tms = 7;
}

message DeploymentResult {
  bool success = 1;
  string error_message = 2;
}

message CancelTaskRequest {
  string task_id = 1;
}

message CheckpointBarrier {
  uint64 checkpoint_id = 1;
  int64 timestamp = 2;
  string job_id = 3;
  repeated string task_ids = 4;
}

message CheckpointComplete {
  uint64 checkpoint_id = 1;
}

message SubmitJobRequest {
  bytes job_plan = 1;
  uint32 parallelism = 2;
}

message SubmitJobResponse {
  string job_id = 1;
  bool accepted = 2;
  string error_message = 3;
}

message GetJobStatusRequest {
  string job_id = 1;
}

enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  JOB_STATUS_CREATED = 1;
  JOB_STATUS_RUNNING = 2;
  JOB_STATUS_FAILED = 3;
  JOB_STATUS_FINISHED = 4;
  JOB_STATUS_CANCELLING = 5;
  JOB_STATUS_CANCELLED = 6;
}

message GetJobStatusResponse {
  string job_id = 1;
  JobStatus status = 2;
  string message = 3;
}

message TriggerCheckpointRequest {
  string job_id = 1;
}

message TriggerCheckpointResponse {
  bool accepted = 1;
  uint64 checkpoint_id = 2;
  string message = 3;
}

message TriggerRescaleRequest {
  string job_id = 1;
  uint32 operator_id = 2;
  uint32 new_parallelism = 3;
}

message TriggerRescaleResponse {
  bool accepted = 1;
  string message = 2;
  uint64 generation = 3;
}

message TaskManagerSummary {
  string tm_id = 1;
  string address = 2;
  uint32 num_slots = 3;
  int64 last_heartbeat_unix_ms = 4;
}

message ListTaskManagersRequest {}

message ListTaskManagersResponse {
  repeated TaskManagerSummary task_managers = 1;
}

message StateEntry {
  bytes key = 1;
  bytes value = 2;
}

message GetRequest {
  bytes key = 1;
  uint64 epoch = 2;
}

message GetResponse {
  bool found = 1;
  bytes value = 2;
}

message PutRequest {
  bytes key = 1;
  bytes value = 2;
  uint64 epoch = 3;
  string task_id = 4;
  uint64 seq_no = 5;
}

message PutResponse {
  bool accepted = 1;
}

message BatchGetRequest {
  repeated bytes keys = 1;
  uint64 epoch = 2;
}

message BatchGetItem {
  bytes key = 1;
  bool found = 2;
  bytes value = 3;
}

message BatchGetResponse {
  repeated BatchGetItem items = 1;
}

message BatchPutRequest {
  repeated StateEntry entries = 1;
  uint64 epoch = 2;
  string task_id = 3;
  uint64 base_seq_no = 4;
}

message BatchPutResponse {
  uint32 written = 1;
}

message TopKeysRequest {
  uint32 limit = 1;
  uint64 epoch = 2;
}

message TopKeysResponse {
  repeated bytes keys = 1;
}

message FlushRequest {
  uint64 epoch = 1;
}

message FlushResponse {
  bool accepted = 1;
}

message TriggerSnapshotRequest {
  uint64 epoch = 1;
}

message TriggerSnapshotResponse {
  bool accepted = 1;
}

message SealRequest {
  uint64 epoch = 1;
}

message SealResponse {
  bool accepted = 1;
}

message RollbackRequest {}

message RollbackResponse {
  bool accepted = 1;
}
